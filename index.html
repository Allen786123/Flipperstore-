<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopify Style Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#0a0d16;
position:sticky;
top:0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
color:#00bfff;
font-weight:bold;
}

nav button{
background:none;
border:none;
color:white;
margin-left:10px;
cursor:pointer;
}

.hero{
text-align:center;
padding:40px 20px;
background:linear-gradient(#0b0f19,#101a33);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:25px;
}

.card{
background:#121a2b;
padding:15px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
}

.price{
color:#00ffb3;
font-weight:bold;
margin:8px 0;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.add{background:#00bfff;}
.remove{background:#ff4d4d;}
.paypal{background:#ffcc00;}
.square{background:#00ff88;color:black;}

.cart{
position:fixed;
right:10px;
bottom:10px;
width:320px;
background:#0f1526;
padding:12px;
border-radius:12px;
max-height:75vh;
overflow:auto;
border:1px solid rgba(255,255,255,0.1);
}

.total{
color:#00ffb3;
margin-top:10px;
font-weight:bold;
}

.admin{
display:none;
padding:20px;
background:#111a33;
margin:20px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:none;
}

</style>
</head>

<body>

<header>
<div class="logo">Shopify Style Store</div>

<nav>
<button onclick="toggleCart()">Cart</button>
<button onclick="toggleAdmin()">Admin</button>
</nav>
</header>

<section class="hero">
<h1>My Tech Store</h1>
<p>Simple Shopify-style storefront</p>
</section>

<section class="grid" id="grid"></section>

<div class="cart" id="cartBox">
<h3>Cart</h3>
<div id="cart"></div>
<div class="total" id="total"></div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminBox">
<h3>Add Product</h3>
<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>

<script>

const PAYPAL_EMAIL = "YOUR_PAYPAL_EMAIL_HERE";

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Flipper Zero",price:280},
{name:"HackRF",price:470},
{name:"PortaPack",price:620},
{name:"Rubber Ducky",price:80},
{name:"WiFi Pineapple",price:250}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* PRODUCTS */
function render(){
document.getElementById("grid").innerHTML =
products.map((p,i)=>`
<div class="card">
<h3>${p.name}</h3>
<div class="price">${p.price} AUD</div>

<button class="add" onclick="add(${i})">Add to Cart</button>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="${PAYPAL_EMAIL}">
<input type="hidden" name="item_name" value="${p.name}">
<input type="hidden" name="amount" value="${p.price}">
<input type="hidden" name="currency_code" value="AUD">
<button class="paypal">PayPal</button>
</form>

<a href="https://squareup.com" target="_blank">
<button class="square">Square</button>
</a>

</div>
`).join("");
}

/* CART */
function add(i){
let item = products[i];
let found = cart.find(c=>c.name===item.name);
if(found) found.qty++;
else cart.push({...item,qty:1});
save();
renderCart();
}

function renderCart(){
let total=0;

document.getElementById("cart").innerHTML =
cart.map((c,i)=>{
total += c.price*c.qty;
return `
<div>
<b>${c.name}</b> x${c.qty}
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
`;
}).join("");

document.getElementById("total").innerText="Total: "+total+" AUD";
}

function removeItem(i){
cart.splice(i,1);
save();
renderCart();
}

/* CART TOGGLE */
function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display==="block"?"none":"block";
}

/* ADMIN */
function toggleAdmin(){
let box=document.getElementById("adminBox");
box.style.display = box.style.display==="block"?"none":"block";
}

function addProduct(){
let n=document.getElementById("name").value;
let p=Number(document.getElementById("price").value);

products.push({name:n,price:p});
save();
render();
alert("Product added!");
}

render();
renderCart();

</script>

</body>
</html>
