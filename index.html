<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipper Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#0a0d16;
position:sticky;
top:0;
z-index:1000;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.logo{
font-size:20px;
font-weight:bold;
color:#00bfff;
}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
background:linear-gradient(#0b0f19,#101a33);
}

.hero h1{
font-size:34px;
color:#00bfff;
}

/* PRODUCTS GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:25px;
}

/* PRODUCT CARD */
.card{
background:#121a2b;
border-radius:14px;
overflow:hidden;
border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.content{
padding:12px;
}

.price{
color:#00ffb3;
font-weight:bold;
margin:8px 0;
}

/* BUTTONS */
button{
width:100%;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

.add{background:#00bfff;}
.paypal{background:#ffcc00;}
.square{background:#00ff88;color:black;}

/* CART */
.cart{
position:fixed;
right:10px;
bottom:10px;
width:320px;
background:#0f1526;
padding:12px;
border-radius:12px;
max-height:70vh;
overflow:auto;
border:1px solid rgba(255,255,255,0.1);
}

.total{
color:#00ffb3;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<div class="logo">Flipper Store</div>
</header>

<section class="hero">
<h1>Premium Tech Store</h1>
<p>Modern Shopify-style layout with real product cards</p>
</section>

<section class="grid" id="grid"></section>

<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
<div class="total" id="total">Total: 0 AUD</div>
</div>

<script>

const PAYPAL_EMAIL="YOUR_PAYPAL_EMAIL_HERE";

/* PRODUCTS WITH IMAGES */
const products=[
{
name:"Flipper Zero",
price:280,
img:"https://m.media-amazon.com/images/I/61cX7K5Y9wL._AC_SL1500_.jpg"
},
{
name:"HackRF One",
price:470,
img:"https://upload.wikimedia.org/wikipedia/commons/3/3a/HackRF_One.jpg"
},
{
name:"PortaPack",
price:620,
img:"https://i.imgur.com/3QZQZ8l.jpg"
},
{
name:"Rubber Ducky",
price:80,
img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/USB_Rubber_Ducky.jpg"
},
{
name:"WiFi Pineapple",
price:250,
img:"https://hak5.org/cdn/shop/products/wifi-pineapple.jpg"
}
];

let cart=[];

/* RENDER PRODUCTS */
function render(){
document.getElementById("grid").innerHTML =
products.map((p,i)=>`
<div class="card">
<img src="${p.img}">
<div class="content">
<h3>${p.name}</h3>
<div class="price">${p.price} AUD</div>

<button class="add" onclick="add(${i})">Add to Cart</button>

<form action="https://www.paypal.com/cgi-bin/webscr" method="post">
<input type="hidden" name="cmd" value="_xclick">
<input type="hidden" name="business" value="${PAYPAL_EMAIL}">
<input type="hidden" name="item_name" value="${p.name}">
<input type="hidden" name="amount" value="${p.price}">
<input type="hidden" name="currency_code" value="AUD">
<button class="paypal">Buy with PayPal</button>
</form>

<a href="https://squareup.com" target="_blank">
<button class="square">Buy with Square</button>
</a>

</div>
</div>
`).join("");
}

/* CART */
function add(i){
cart.push(products[i]);
renderCart();
}

function renderCart(){
let total=0;

document.getElementById("cart").innerHTML =
cart.map(c=>{
total+=c.price;
return `<div>${c.name} - ${c.price} AUD</div>`;
}).join("");

document.getElementById("total").innerText="Total: "+total+" AUD";
}

render();
renderCart();

</script>

</body>
</html>
