<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flipper Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#111;
}

/* HEADER */
header{
background:white;
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #e5e5e5;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
}

nav a{
text-decoration:none;
color:#333;
margin-left:20px;
font-size:15px;
}

/* HERO */
.hero{
background:white;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:48px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#666;
max-width:650px;
margin:auto;
line-height:1.6;
}

/* PRODUCTS */
.products{
padding:50px 30px;
max-width:1300px;
margin:auto;
}

.products h2{
font-size:30px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
border:1px solid #e5e5e5;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card h3{
margin-bottom:10px;
}

.desc{
font-size:14px;
color:#666;
line-height:1.5;
margin-bottom:15px;
min-height:60px;
}

.price{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
background:black;
color:white;
border-radius:8px;
font-size:15px;
cursor:pointer;
margin-top:8px;
}

button:hover{
opacity:0.9;
}

/* CART */
.cart{
position:fixed;
right:20px;
bottom:20px;
width:320px;
background:white;
padding:20px;
border-radius:14px;
border:1px solid #ddd;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
max-height:70vh;
overflow:auto;
}

.cart h3{
margin-bottom:15px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:15px;
}

/* FOOTER */
footer{
padding:30px;
text-align:center;
color:#777;
font-size:14px;
}

@media(max-width:700px){

.hero h1{
font-size:34px;
}

header{
padding:15px 20px;
}

.cart{
width:90%;
right:5%;
}
}
</style>
</head>

<body>

<header>
<div class="logo">Flipper Store</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Modern Tech Store</h1>

<p>
Premium gaming, wireless and handheld technology products with a clean shopping experience.
</p>
</section>

<section class="products">

<h2>Featured Products</h2>

<div class="grid" id="products"></div>

</section>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>

<div id="cart-items"></div>

<div class="total" id="total">
Total: 0 AUD
</div>

<!-- PAYPAL -->
<form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">

<input type="hidden" name="cmd" value="_xclick">

<input type="hidden" name="business" value="YOUR_PAYPAL_EMAIL_HERE">

<input type="hidden" name="item_name" value="Flipper Store Order">

<input type="hidden" name="currency_code" value="AUD">

<button type="submit">
Checkout with PayPal
</button>

</form>

<!-- SQUARE -->
<a href="https://square.link/u/YOUR_SQUARE_LINK" target="_blank">

<button>
Checkout with Square
</button>

</a>

</div>

<footer>
© 2026 Flipper Store. All rights reserved.
</footer>

<script>

const products = [

{
name:"Flipper Zero",
price:280,
img:"https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop",
desc:"Portable multi-tool for wireless testing and hardware development."
},

{
name:"HackRF One",
price:470,
img:"https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1200&auto=format&fit=crop",
desc:"Software-defined radio platform for advanced wireless experimentation."
},

{
name:"PortaPack H2",
price:620,
img:"https://images.unsplash.com/photo-1587202372775-e229f172b9d7?q=80&w=1200&auto=format&fit=crop",
desc:"Portable HackRF addon with touchscreen and standalone SDR capabilities."
},

{
name:"Hak5 Rubber Ducky",
price:80,
img:"https://images.unsplash.com/photo-1593642634524-b40b5baae6bb?q=80&w=1200&auto=format&fit=crop",
desc:"USB automation and scripting device for testing workflows."
},

{
name:"WiFi Pineapple",
price:250,
img:"https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?q=80&w=1200&auto=format&fit=crop",
desc:"Wireless network auditing and analysis device."
},

{
name:"PlayStation 5 Slim Digital",
price:810,
img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db?q=80&w=1200&auto=format&fit=crop",
desc:"Next-generation PlayStation gaming console."
},

{
name:"Steam Deck",
price:449,
img:"https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?q=80&w=1200&auto=format&fit=crop",
desc:"Portable handheld gaming PC with SteamOS."
},

{
name:"Steam Deck OLED",
price:950,
img:"https://images.unsplash.com/photo-1616587894289-86480e533129?q=80&w=1200&auto=format&fit=crop",
desc:"Enhanced OLED handheld gaming console with upgraded battery."
},

{
name:"ROG Ally",
price:1600,
img:"https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1200&auto=format&fit=crop",
desc:"Premium handheld gaming device powered by Windows."
},

{
name:"ROG Ally Previous Model",
price:649,
img:"https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=1200&auto=format&fit=crop",
desc:"Original ROG Ally handheld gaming model."
}

];

let cart = [];

const productContainer = document.getElementById("products");

products.forEach((p,index)=>{

productContainer.innerHTML += `

<div class="card">

<img src="${p.img}">

<div class="card-content">

<h3>${p.name}</h3>

<div class="desc">${p.desc}</div>

<div class="price">${p.price} AUD</div>

<button onclick="addToCart(${index})">
Add to Cart
</button>

</div>

</div>

`;

});

function addToCart(index){

cart.push(products[index]);

renderCart();

}

function renderCart(){

const cartItems = document.getElementById("cart-items");

cartItems.innerHTML = "";

let total = 0;

cart.forEach(item=>{

total += item.price;

cartItems.innerHTML += `
<p>
${item.name} - ${item.price} AUD
</p>
`;

});

document.getElementById("total").innerHTML =
"Total: " + total + " AUD";

}

</script>

</body>
</html>
